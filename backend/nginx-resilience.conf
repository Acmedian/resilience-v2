server {
    listen 80;
    server_name resilience.acmedian.com;
    return 301 https://$server_name$request_uri;
}
server {
    listen 443 ssl;
    server_name resilience.acmedian.com;

    ssl_certificate /etc/letsencrypt/live/resilience.acmedian.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/resilience.acmedian.com/privkey.pem;

    # Frontend (static files)
    location / {
        root /var/www/resilience-v2;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api {
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
